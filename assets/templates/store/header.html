<div class="dce-store-head">
  <div class="dce-store-head-media">
    {{ avatar }}
    <div class="dce-store-head-content">
      <h2 class="dce-store-title">{{ name }}</h2>
      <p class="dce-store-meta">
        <a href="{{ webUrl }}" target="_blank" rel="noopener"
          >{{ displayUrl }}</a
        >{{ authorHtml }}
      </p>
      <p class="dce-store-desc">{{ description }}</p>
    </div>
  </div>
  <div class="dce-store-git">
    <span class="dce-git-label">git</span
    ><input
      class="dce-git-input"
      type="text"
      readonly
      value="{{ gitUrl }}"
      onclick="this.select()"
    /><button type="button" class="dce-btn" data-copy="{{ gitUrl }}">
      Copy
    </button>
  </div>
</div>
